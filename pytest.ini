[pytest]
testpaths = tests
markers =
    hil: requires physical HiL bench
    sil: can run on simulated ECU
    smoke: fast subset for commit checks
    regression: full nightly regression
    e2e: multi-ECU end-to-end scenario
    backend: requires VW backend access
    performance: timing-sensitive test
    unit: offline unit test
    integration: single-ECU diagnostic
addopts = -v --strict-markers --tb=short
